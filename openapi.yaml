openapi: 3.1.0

info:
  title: Smart Campus — Camera Stream AI Vision API
  version: 1.0.0
  description: |
    Contract-first REST API between Camera Stream Service
    and AI Vision Service for motion detection and object analysis.

  contact:
    name: FIT4110 Team
    email: fit4110@example.edu.vn

servers:
  - url: http://localhost:4010
    description: Prism mock server

  - url: https://api.campus.local
    description: Class network placeholder

tags:
  - name: vision
    description: AI Vision detection APIs

  - name: health
    description: Health check endpoints

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service health
      description: Check whether AI Vision service is running normally.
      tags: [health]
      security: []

      responses:
        '200':
          description: Service healthy

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

              examples:
                ok:
                  value:
                    status: ok
                    service: camera-stream-ai-vision
                    time: '2026-05-15T10:00:00Z'

  /vision/detect:
    post:
      operationId: detectObjects
      summary: Detect objects from image frame
      description: Analyze image frame and detect objects or suspicious activity.
      tags: [vision]

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectionRequest'

            examples:
              sample:
                value:
                  correlationId: corr-001
                  cameraId: CAM-01
                  imageUrl: https://example.com/frame.jpg
                  timestamp: '2026-05-15T10:00:00Z'

      responses:
        '200':
          description: Detection successful

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Get detection detail
      description: Retrieve detection result by detection identifier.
      tags: [vision]

      parameters:
        - name: detectionId
          in: path
          required: true

          schema:
            type: string

      responses:
        '200':
          description: Detection detail

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'

        '404':
          $ref: '#/components/responses/NotFound'

  /vision/models/info:
    get:
      operationId: getModelInfo
      summary: Get AI model information
      description: Retrieve AI model metadata and accuracy information.
      tags: [vision]

      responses:
        '200':
          description: AI model information

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false

      required:
        - status
        - service
        - time

      properties:
        status:
          type: string
          enum: [ok]

        service:
          type: string

        time:
          type: string
          format: date-time

    DetectionRequest:
      type: object
      additionalProperties: false

      required:
        - correlationId
        - cameraId
        - imageUrl

      properties:
        correlationId:
          type: string
          example: corr-001

        cameraId:
          type: string
          example: CAM-01

        imageUrl:
          type: string
          format: uri
          example: https://example.com/frame.jpg

        timestamp:
          type: [string, 'null']
          format: date-time

    DetectionResponse:
      type: object
      additionalProperties: false

      required:
        - detectionId
        - confidence
        - riskLevel
        - objects

      properties:
        detectionId:
          type: string
          format: uuid

        confidence:
          type: number
          minimum: 0
          maximum: 1

        riskLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH

        objects:
          type: array

          items:
            $ref: '#/components/schemas/DetectedObject'

        detectionResult:
          oneOf:
            - $ref: '#/components/schemas/HumanDetection'
            - $ref: '#/components/schemas/VehicleDetection'

          discriminator:
            propertyName: type

    DetectedObject:
      type: object
      additionalProperties: false

      required:
        - label
        - confidence

      properties:
        label:
          type: string
          example: person

        confidence:
          type: number
          minimum: 0
          maximum: 1

    HumanDetection:
      type: object
      additionalProperties: false

      properties:
        type:
          type: string
          const: HUMAN

        personCount:
          type: integer
          minimum: 1

    VehicleDetection:
      type: object
      additionalProperties: false

      properties:
        type:
          type: string
          const: VEHICLE

        vehicleType:
          type: string
          example: car

    ModelInfo:
      type: object
      additionalProperties: false

      required:
        - modelName
        - version
        - accuracy

      properties:
        modelName:
          type: string
          example: YOLOv8

        version:
          type: string
          example: "8.0"

        accuracy:
          type: number
          minimum: 0
          maximum: 100

    Problem:
      type: object
      additionalProperties: false

      required:
        - type
        - title
        - status

      properties:
        type:
          type: string
          format: uri

        title:
          type: string

        status:
          type: integer

        detail:
          type: [string, 'null']

        instance:
          type: [string, 'null']
          format: uri

  responses:
    BadRequest:
      description: Invalid request

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Internal server error

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'